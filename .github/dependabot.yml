version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      go-mod-root:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/hack/tools/controller-gen"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      controller-gen-tools:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      docs-npm:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      docker-images:
        patterns: ["*"]
